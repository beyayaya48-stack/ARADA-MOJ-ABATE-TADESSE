    // Status indicator with color
    function getStatusDot(status) {
      const colors = {
        'in-progress': 'bg-blue-500',
        'planned': 'bg-yellow-500',
        'completed': 'bg-green-500'
      };
      const color = colors[status] || 'bg-gray-400';
      return `<span class="progress-indicator ${color}"></span>`;
    }

    // Status text in Amharic
    function getStatusText(status) {
      const texts = {
        'in-progress': 'እየተከናወነ ነው',
        'planned': 'ያልተጀመረ',
        'completed': 'ተጠናቋል'
      };
      return texts[status] || status;
    }

    // Render task card - WITHOUT date range
    function renderTaskCard(t, number) {
      return `
        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-lg transition flex flex-col gap-2">
          <!-- Number -->
          <div class="text-3xl font-bold text-gray-800 mb-2">${number}.</div>
          
          <!-- Pillar / Goal / CloseResult badges -->
          <div class="flex flex-wrap items-center gap-2 text-sm mb-1">
            <span class="bg-blue-100 px-2 py-0.5 rounded-full font-semibold">አምድ · ${t.pillar.weight}</span>
            <span class="bg-green-100 px-2 py-0.5 rounded-full font-semibold">ግብ · ${t.goal.weight || ''}</span>
            <span class="bg-purple-100 px-2 py-0.5 rounded-full font-semibold">ውጤት · ${t.closeResult.weight || ''}</span>
          </div>
          <!-- Names -->
          <div class="font-bold text-lg">🏛️ ${t.pillar.name}</div>
          <div class="font-semibold text-base">🎯 ${t.goal.name}</div>
          <div class="text-base italic">✨ ${t.closeResult.name}</div>
          
          <div class="mt-2 font-medium text-blue-800 border-t pt-2">📋 ዋና ተግባር (lvl4):</div>
          <div class="text-base bg-gray-50 p-3 rounded-lg">${t.mainTask}</div>
          
          <!-- detailed tasks -->
          <ul class="list-disc pl-5 text-sm text-gray-700 space-y-0.5 mt-1">
            ${t.detailedTasks.map(d => `<li>${d}</li>`).join('')}
          </ul>
          
          <!-- Weight & Responsible -->
          <div class="flex flex-wrap items-center gap-3 mt-2">
            <span class="bg-gray-200 px-3 py-1 rounded-full text-sm font-semibold">ክብደት: ${t.weight}</span>
            <span class="bg-blue-50 px-3 py-1 rounded-full text-sm font-semibold border border-blue-200">ፈፃሚ አካል: ${t.responsible.join('፣ ')}</span>
          </div>
          
          <!-- TIMELINE - only status indicator, NO DATES -->
          <div class="timeline-box mt-2 flex items-center justify-between">
            <span class="font-semibold">📅 የአፈጻጸም ሁኔታ:</span>
            <div class="flex items-center gap-1">
              ${getStatusDot(t.status)}
              <span class="font-medium">${getStatusText(t.status)}</span>
            </div>
          </div>
          
          <!-- KPI & Indicators -->
          <div class="mt-2 text-base"><span class="font-bold">KPI:</span> ${t.kpi}</div>
          <div class="kpi-box mt-1">📊 አመላካች: ${t.indicators}</div>
        </div>
      `;
    }

    // Filter by responsible
    function filterByRole(role) {
      return allTasks.filter(t => t.responsible.includes(role));
    }

    // Render role page
    function renderRolePage(role, roleName, colorClass) {
      const tasks = filterByRole(role);
      if (tasks.length === 0) return `<div class="p-10 text-center">ለዚህ ኃላፊነት የተወሰኑ ተግባራት አልተገኙም።</div>`;
      let html = `<h2 class="text-3xl font-bold mb-5 ${colorClass} bg-opacity-20 p-3 rounded-2xl">${roleName} · በፈፃሚነት የተመደቡ ተግባራት (${tasks.length})</h2>`;
      html += `<div class="grid grid-cols-1 gap-5">`;
      tasks.forEach((t, index) => { html += renderTaskCard(t, index + 1); });
      html += `</div>`;
      return html;
    }

    // Home page - simplified to only show title and role statistics
    function renderHome() {
      return `
        <div class="text-center py-8 max-w-2xl mx-auto">
          <h2 class="text-4xl font-bold text-slate-900 mb-8">በፍትህ ሚኒስቴር የአራዳ ቅ/ጽ ቤት 2018 የስድስት ወር ሪፖርት እና እቅድ</h2>
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
            <a href="#head" class="bg-blue-100 hover:bg-blue-200 p-6 rounded-2xl shadow-sm transition">
              <div class="text-4xl font-bold text-blue-800">${filterByRole('ሀላፊ').length}</div>
              <div class="text-lg mt-2">👤 ሀላፊ</div>
              <div class="text-base text-gray-600">ዋና ተግባራት</div>
            </a>
            <a href="#teamlead" class="bg-green-100 hover:bg-green-200 p-6 rounded-2xl shadow-sm transition">
              <div class="text-4xl font-bold text-green-800">${filterByRole('ቡድን መሪ').length}</div>
              <div class="text-lg mt-2">👥 ቡድን መሪ</div>
              <div class="text-base text-gray-600">ዋና ተግባራት</div>
            </a>
            <a href="#prosecutor" class="bg-red-100 hover:bg-red-200 p-6 rounded-2xl shadow-sm transition">
              <div class="text-4xl font-bold text-red-800">${filterByRole('ዐቃቤ ሕግ').length}</div>
              <div class="text-lg mt-2">⚖️ ዐቃቤ ሕግ</div>
              <div class="text-base text-gray-600">ዋና ተግባራት</div>
            </a>
          </div>
        </div>
      `;
    }

    // Routing
    const contentDiv = document.getElementById('page-content');
    function updatePage() {
      const hash = window.location.hash.substring(1) || 'home';
      if (hash === 'head') {
        contentDiv.innerHTML = renderRolePage('ሀላፊ', 'ሀላፊ (Head)', 'text-blue-300 bg-blue-900');
      } else if (hash === 'teamlead') {
        contentDiv.innerHTML = renderRolePage('ቡድን መሪ', 'ቡድን መሪ (Team Lead)', 'text-green-300 bg-green-900');
      } else if (hash === 'prosecutor') {
        contentDiv.innerHTML = renderRolePage('ዐቃቤ ሕግ', 'ዐቃቤ ሕግ (Prosecutor)', 'text-red-300 bg-red-900');
      } else {
        contentDiv.innerHTML = renderHome();
      }
      // Active nav
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
      const active = document.querySelector(`a[href="#${hash}"]`);
      if (active) active.classList.add('nav-active');
    }

    window.addEventListener('hashchange', updatePage);
    window.addEventListener('DOMContentLoaded', () => {
      if (!window.location.hash || window.location.hash === '#') window.location.hash = 'home';
      updatePage();
    });
  })();
</script>
</body>
</html>
